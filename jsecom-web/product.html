<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add to Cart 🛒 with Reduce</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    .cart { margin-top: 20px; padding: 10px; border: 2px solid #000; }
  </style>
</head>
<body>

  <!-- Header -->
  <h2>🛒 Cart (<span id="cartCount">0</span>)</h2>

  <!-- Products -->
  <div class="product">
    <h3>Shirt</h3>
    <p>Price: Rs 2000</p>
    <button onclick="addToCart('Shirt', 2000)">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Shoes</h3>
    <p>Price: Rs 5000</p>
    <button onclick="addToCart('Shoes', 5000)">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Cap</h3>
    <p>Price: Rs 800</p>
    <button onclick="addToCart('Cap', 800)">Add to Cart</button>
  </div>

  <!-- Cart -->
  <div class="cart">
    <h3>Cart Summary</h3>
    <ul id="cartItems"></ul>
    <h4>Total Bill: Rs <span id="totalBill">0</span></h4>
  </div>

<script>
  let cart = [];

  function addToCart(name, price) {
    let existing = cart.find(item => item.name === name);

    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ name, price, qty: 1 });
    }

    updateCart();
  }

  function updateCart() {
    let cartList = document.getElementById("cartItems");
    cartList.innerHTML = "";

    cart.forEach(item => {
      let li = document.createElement("li");
      li.innerText = `${item.name} x ${item.qty} = Rs ${item.price * item.qty}`;
      cartList.appendChild(li);
    });

    // 🔥 reduce() for total price
    let total = cart.reduce((sum, item) => {
      return sum + item.price * item.qty;
    }, 0);

    // 🔥 reduce() for total quantity
    let count = cart.reduce((sum, item) => {
      return sum + item.qty;
    }, 0);

    document.getElementById("totalBill").innerText = total;
    document.getElementById("cartCount").innerText = count;
  }
</script>

</body>
</html>
